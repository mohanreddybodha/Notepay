AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: NotePay Serverless API with WebSockets

Resources:
  # -----------------------------------------------------
  # 1. API Gateway WebSocket Configuration
  # -----------------------------------------------------
  WebSocketApi:
    Type: AWS::ApiGatewayV2::Api
    Properties:
      Name: NotePayWebSocket
      ProtocolType: WEBSOCKET
      RouteSelectionExpression: "$request.body.action"

  ConnectRoute:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId: !Ref WebSocketApi
      RouteKey: $connect
      AuthorizationType: NONE
      Target: !Join ['/', ['integrations', !Ref WebSocketIntegration]]

  DisconnectRoute:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId: !Ref WebSocketApi
      RouteKey: $disconnect
      AuthorizationType: NONE
      Target: !Join ['/', ['integrations', !Ref WebSocketIntegration]]

  DefaultRoute:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId: !Ref WebSocketApi
      RouteKey: $default
      AuthorizationType: NONE
      Target: !Join ['/', ['integrations', !Ref WebSocketIntegration]]

  WebSocketIntegration:
    Type: AWS::ApiGatewayV2::Integration
    Properties:
      ApiId: !Ref WebSocketApi
      Description: WebSocket Integration
      IntegrationType: AWS_PROXY
      IntegrationUri: 
        Fn::Sub: "arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${NotePayFunction.Arn}/invocations"

  WebSocketDeployment:
    Type: AWS::ApiGatewayV2::Deployment
    DependsOn:
      - ConnectRoute
      - DisconnectRoute
      - DefaultRoute
    Properties:
      ApiId: !Ref WebSocketApi

  WebSocketStage:
    Type: AWS::ApiGatewayV2::Stage
    Properties:
      ApiId: !Ref WebSocketApi
      DeploymentId: !Ref WebSocketDeployment
      StageName: prod

  # -----------------------------------------------------
  # 2. Main Lambda Function
  # -----------------------------------------------------
  NotePayFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: backend/
      Handler: main.handler
      Runtime: python3.11
      Timeout: 30
      MemorySize: 512
      Environment:
        Variables:
          ENVIRONMENT: production
          # Needed by boto3 to push messages back to clients
          WEBSOCKET_URL: !Join ['', ['https://', !Ref WebSocketApi, '.execute-api.', !Ref 'AWS::Region', '.amazonaws.com/prod']]
          # Securely fetch secrets from AWS Parameter Store at deploy time
          DATABASE_URL: '{{resolve:ssm:/notepay/database_url}}'
          REDIS_URL: '{{resolve:ssm:/notepay/redis_url}}'
          ALLOWED_ORIGINS: '{{resolve:ssm:/notepay/allowed_origins}}'
          ADMIN_DOMAIN: !Join ['', ['https://', !GetAtt AdminFrontendDistribution.DomainName]]
          GEMINI_KEY_1: '{{resolve:ssm:/notepay/gemini_key_1}}'
          GROQ_API_KEY: '{{resolve:ssm:/notepay/groq_key}}'
          RECEIPTS_BUCKET: !Ref ReceiptsBucket
      Policies:
        - AmazonSSMReadOnlyAccess
        - Statement:
            - Effect: Allow
              Action:
                - execute-api:ManageConnections
              Resource: !Sub "arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${WebSocketApi}/*"
            - Effect: Allow
              Action:
                - s3:PutObject
                - s3:GetObject
                - s3:DeleteObject
              Resource: !Sub "${ReceiptsBucket.Arn}/*"
      # This provides the HTTP endpoint
      FunctionUrlConfig:
        AuthType: NONE

  # Grant API Gateway permission to invoke the Lambda function
  NotePayFunctionPermission:
    Type: AWS::Lambda::Permission
    Properties:
      Action: lambda:InvokeFunction
      FunctionName: !Ref NotePayFunction
      Principal: apigateway.amazonaws.com

  # ── Lambda Warmup: ping every 4 min to prevent cold starts ──
  WarmupSchedule:
    Type: AWS::Events::Rule
    Properties:
      Name: !Sub "${AWS::StackName}-warmup"
      Description: "Keeps NotePayFunction warm by pinging every 4 minutes"
      ScheduleExpression: "rate(4 minutes)"
      State: ENABLED
      Targets:
        - Arn: !GetAtt NotePayFunction.Arn
          Id: NotePayWarmupTarget
          Input: '{"source":"notepay-warmup"}'

  WarmupPermission:
    Type: AWS::Lambda::Permission
    Properties:
      Action: lambda:InvokeFunction
      FunctionName: !Ref NotePayFunction
      Principal: events.amazonaws.com
      SourceArn: !GetAtt WarmupSchedule.Arn

  # -----------------------------------------------------
  # 3. Frontend Hosting (S3 + CloudFront)
  # -----------------------------------------------------
  FrontendBucket:
    Type: AWS::S3::Bucket
    Properties:
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true

  CloudFrontOAC:
    Type: AWS::CloudFront::OriginAccessControl
    Properties:
      OriginAccessControlConfig:
        Name: !Sub "${AWS::StackName}-OAC"
        OriginAccessControlOriginType: s3
        SigningBehavior: always
        SigningProtocol: sigv4

  UrlRewriteFunction:
    Type: AWS::CloudFront::Function
    Properties:
      Name: UrlRewrite
      AutoPublish: true
      FunctionConfig:
        Comment: "Rewrite clean URLs to append .html"
        Runtime: cloudfront-js-1.0
      FunctionCode: |
        function handler(event) {
            var request = event.request;
            var uri = request.uri;
            if (uri.endsWith('/')) {
                request.uri += 'login.html';
            } else if (!uri.includes('.')) {
                request.uri += '.html';
            }
            return request;
        }

  # ── Security Headers Policy (applied to all CloudFront responses) ──
  SecurityHeadersPolicy:
    Type: AWS::CloudFront::ResponseHeadersPolicy
    Properties:
      ResponseHeadersPolicyConfig:
        Name: !Sub "${AWS::StackName}-security-headers"
        Comment: "Security headers for Notepay frontend"
        SecurityHeadersConfig:
          FrameOptions:
            FrameOption: DENY
            Override: true
          ContentTypeOptions:
            Override: true
          ReferrerPolicy:
            ReferrerPolicy: strict-origin-when-cross-origin
            Override: true
          StrictTransportSecurity:
            AccessControlMaxAgeSec: 31536000
            IncludeSubdomains: true
            Override: true
        CustomHeadersConfig:
          Items:
            - Header: Permissions-Policy
              Value: "camera=(), microphone=(), geolocation=()"
              Override: true

  FrontendDistribution:
    Type: AWS::CloudFront::Distribution
    Properties:
      DistributionConfig:
        Enabled: true
        DefaultRootObject: login.html
        Aliases:
          - notepay.in
          - www.notepay.in
        ViewerCertificate:
          AcmCertificateArn: arn:aws:acm:us-east-1:744746597315:certificate/39e14f5c-b8fd-49e9-9f34-d77fb9042c6b
          SslSupportMethod: sni-only
          MinimumProtocolVersion: TLSv1.2_2021
        Origins:
          - DomainName: !GetAtt FrontendBucket.RegionalDomainName
            Id: S3Origin
            S3OriginConfig:
              OriginAccessIdentity: ""
            OriginAccessControlId: !GetAtt CloudFrontOAC.Id
        DefaultCacheBehavior:
          TargetOriginId: S3Origin
          ViewerProtocolPolicy: redirect-to-https
          AllowedMethods: [GET, HEAD, OPTIONS]
          CachedMethods: [GET, HEAD]
          ResponseHeadersPolicyId: !Ref SecurityHeadersPolicy
          FunctionAssociations:
            - EventType: viewer-request
              FunctionARN: !GetAtt UrlRewriteFunction.FunctionARN
          ForwardedValues:
            # QueryString: true allows ?v=4 cache-busting to work correctly
            QueryString: true
            Cookies:
              Forward: none
        # Fix: redirect 404/403 (clean-URL refreshes) to error.html → error.html
        # redirects the browser back to the correct .html page automatically
        CustomErrorResponses:
          - ErrorCode: 404
            ResponseCode: 200
            ResponsePagePath: /error.html
            ErrorCachingMinTTL: 0
          - ErrorCode: 403
            ResponseCode: 200
            ResponsePagePath: /error.html
            ErrorCachingMinTTL: 0

  FrontendBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref FrontendBucket
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: cloudfront.amazonaws.com
            Action: s3:GetObject
            Resource: !Sub "${FrontendBucket.Arn}/*"
            Condition:
              StringEquals:
                AWS:SourceArn: !Sub "arn:aws:cloudfront::${AWS::AccountId}:distribution/${FrontendDistribution.Id}"

  # -----------------------------------------------------
  # 4. Admin Frontend Hosting (S3 + CloudFront)
  # -----------------------------------------------------
  AdminFrontendBucket:
    Type: AWS::S3::Bucket
    Properties:
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true

  AdminCloudFrontOAC:
    Type: AWS::CloudFront::OriginAccessControl
    Properties:
      OriginAccessControlConfig:
        Name: !Sub "${AWS::StackName}-Admin-OAC"
        OriginAccessControlOriginType: s3
        SigningBehavior: always
        SigningProtocol: sigv4

  AdminFrontendDistribution:
    Type: AWS::CloudFront::Distribution
    Properties:
      DistributionConfig:
        Enabled: true
        DefaultRootObject: admin.html
        Aliases:
          - admin.notepay.in
        ViewerCertificate:
          AcmCertificateArn: arn:aws:acm:us-east-1:744746597315:certificate/39e14f5c-b8fd-49e9-9f34-d77fb9042c6b
          SslSupportMethod: sni-only
          MinimumProtocolVersion: TLSv1.2_2021
        Origins:
          - DomainName: !GetAtt AdminFrontendBucket.RegionalDomainName
            Id: S3OriginAdmin
            S3OriginConfig:
              OriginAccessIdentity: ""
            OriginAccessControlId: !GetAtt AdminCloudFrontOAC.Id
        DefaultCacheBehavior:
          TargetOriginId: S3OriginAdmin
          ViewerProtocolPolicy: redirect-to-https
          AllowedMethods: [GET, HEAD, OPTIONS]
          CachedMethods: [GET, HEAD]
          ResponseHeadersPolicyId: !Ref SecurityHeadersPolicy
          ForwardedValues:
            QueryString: true
            Cookies:
              Forward: none

  AdminFrontendBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref AdminFrontendBucket
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: cloudfront.amazonaws.com
            Action: s3:GetObject
            Resource: !Sub "${AdminFrontendBucket.Arn}/*"
            Condition:
              StringEquals:
                AWS:SourceArn: !Sub "arn:aws:cloudfront::${AWS::AccountId}:distribution/${AdminFrontendDistribution.Id}"

  # -----------------------------------------------------
  # 5. Private Receipt Storage (S3)
  # -----------------------------------------------------
  ReceiptsBucket:
    Type: AWS::S3::Bucket
    Properties:
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true

Outputs:
  HttpApiUrl:
    Description: "HTTP API Endpoint URL (Function URL)"
    Value: !GetAtt NotePayFunctionUrl.FunctionUrl
  WebSocketUrl:
    Description: "WebSocket API Endpoint URL"
    Value: !Join ['', ['wss://', !Ref WebSocketApi, '.execute-api.', !Ref 'AWS::Region', '.amazonaws.com/prod']]
  FrontendBucketName:
    Description: "Frontend S3 Bucket Name"
    Value: !Ref FrontendBucket
  CloudFrontDomain:
    Description: "CloudFront URL for Frontend"
    Value: !Join ['', ['https://', !GetAtt FrontendDistribution.DomainName]]
  CloudFrontDistributionId:
    Description: "CloudFront Distribution ID"
    Value: !Ref FrontendDistribution
  AdminBucketName:
    Description: "Admin Frontend S3 Bucket Name"
    Value: !Ref AdminFrontendBucket
  AdminCloudFrontDomain:
    Description: "CloudFront URL for Admin Frontend"
    Value: !Join ['', ['https://', !GetAtt AdminFrontendDistribution.DomainName]]
  AdminCloudFrontDistributionId:
    Description: "CloudFront Distribution ID for Admin"
    Value: !Ref AdminFrontendDistribution
