name: Deploy NotePay Serverless Stack

on:
  push:
    branches:
      - main
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - 'LICENSE'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test-backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: 'backend/requirements.txt'
      - name: Install dependencies
        run: |
          pip install -r backend/requirements.txt
          pip install pytest httpx
      - name: Run Pytest
        run: |
          cd backend
          if [ -d "tests" ]; then pytest tests/ -v -W ignore::DeprecationWarning; else echo "No tests found, skipping."; fi

  deploy-backend:
    runs-on: ubuntu-latest
    needs: test-backend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: 'backend/requirements.txt'

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-southeast-1

      - name: Install SAM CLI
        uses: aws-actions/setup-sam@v2

      - name: Create Firebase Service Account File
        env:
          FIREBASE_SECRET: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
        run: |
          echo "$FIREBASE_SECRET" > backend/service_account.json

      - name: Install dependencies for migrations
        run: |
          pip install -r backend/requirements.txt

      - name: Run Database Migrations
        run: |
          # Fetch the pooled Postgres endpoint from SSM Parameter Store securely
          DATABASE_URL=$(aws ssm get-parameter --name "/notepay/database_url" --with-decryption --query "Parameter.Value" --output text)
          
          # Execute migration upgrade head
          cd backend
          DATABASE_URL=$DATABASE_URL alembic upgrade head

      - name: SAM Build
        run: |
          sam build
          rm -f backend/service_account.json

      - name: SAM Deploy
        run: |
          # Save the current function version BEFORE deploying so we can roll back
          FUNC_NAME=$(aws cloudformation describe-stack-resource \
            --stack-name notepay-stack \
            --logical-resource-id NotePayFunction \
            --query "StackResourceDetail.PhysicalResourceId" \
            --output text 2>/dev/null || echo "")
          if [ -n "$FUNC_NAME" ]; then
            PREV_VERSION=$(aws lambda get-function-configuration \
              --function-name "$FUNC_NAME" \
              --query "Version" --output text 2>/dev/null || echo "")
            echo "PREV_VERSION=$PREV_VERSION" >> $GITHUB_ENV
            echo "FUNC_NAME=$FUNC_NAME" >> $GITHUB_ENV
            echo "Pre-deploy Lambda version: $PREV_VERSION"
          fi

          sam deploy --no-confirm-changeset \
                     --no-fail-on-empty-changeset \
                     --stack-name notepay-stack \
                     --resolve-s3 \
                     --capabilities CAPABILITY_IAM \
                     --region ap-southeast-1

      - name: Health Check After Deploy
        run: |
          API_URL=$(aws cloudformation describe-stacks \
            --stack-name notepay-stack \
            --query "Stacks[0].Outputs[?OutputKey=='HttpApiUrl'].OutputValue" \
            --output text)
          
          echo "Testing health endpoint at $API_URL/health..."
          # Retry up to 3 times (Lambda may be cold on first deploy)
          for i in 1 2 3; do
            HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
              --max-time 30 "$API_URL/health")
            echo "Attempt $i: HTTP $HTTP_STATUS"
            [ "$HTTP_STATUS" = "200" ] && break
            sleep 10
          done

          if [ "$HTTP_STATUS" != "200" ]; then
            echo "❌ Health check failed with status $HTTP_STATUS after 3 attempts"

            # ── Auto-rollback: restore previous Lambda code version ──
            if [ -n "$FUNC_NAME" ] && [ -n "$PREV_VERSION" ] && [ "$PREV_VERSION" != "$NOTSET" ]; then
              echo "⏪ Rolling back $FUNC_NAME to version $PREV_VERSION..."
              aws lambda update-alias \
                --function-name "$FUNC_NAME" \
                --name live \
                --function-version "$PREV_VERSION" 2>/dev/null || true
              echo "Rollback attempted. Manual review of CloudFormation stack may be needed."
            fi

            echo "❌ Deploy rolled back — check CloudWatch logs for root cause" >> $GITHUB_STEP_SUMMARY
            exit 1
          fi
          
          echo "✅ Health check passed — status $HTTP_STATUS"

      - name: Notify on failure
        if: failure()
        run: |
          echo "❌ Notepay backend deploy failed on commit ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY

  deploy-frontend:
    runs-on: ubuntu-latest
    needs: test-backend
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-southeast-1

      - name: Deploy Frontend to S3 and CloudFront
        run: |
          # 1. Get dynamically created URLs and IDs from AWS CloudFormation
          API_URL=$(aws cloudformation describe-stacks --stack-name notepay-stack --query "Stacks[0].Outputs[?OutputKey=='HttpApiUrl'].OutputValue" --output text)
          WS_URL=$(aws cloudformation describe-stacks --stack-name notepay-stack --query "Stacks[0].Outputs[?OutputKey=='WebSocketUrl'].OutputValue" --output text)
          BUCKET_NAME=$(aws cloudformation describe-stacks --stack-name notepay-stack --query "Stacks[0].Outputs[?OutputKey=='FrontendBucketName'].OutputValue" --output text)
          CF_ID=$(aws cloudformation describe-stacks --stack-name notepay-stack --query "Stacks[0].Outputs[?OutputKey=='CloudFrontDistributionId'].OutputValue" --output text)
          CF_DOMAIN=$(aws cloudformation describe-stacks --stack-name notepay-stack --query "Stacks[0].Outputs[?OutputKey=='CloudFrontDomain'].OutputValue" --output text)
          
          ADMIN_BUCKET=$(aws cloudformation describe-stacks --stack-name notepay-stack --query "Stacks[0].Outputs[?OutputKey=='AdminBucketName'].OutputValue" --output text)
          ADMIN_CF_ID=$(aws cloudformation describe-stacks --stack-name notepay-stack --query "Stacks[0].Outputs[?OutputKey=='AdminCloudFrontDistributionId'].OutputValue" --output text)
          ADMIN_CF_DOMAIN=$(aws cloudformation describe-stacks --stack-name notepay-stack --query "Stacks[0].Outputs[?OutputKey=='AdminCloudFrontDomain'].OutputValue" --output text)

          # 2. Inject the real API/WebSocket URLs into the frontend code before uploading
          sed -i "s|API_PLACEHOLDER|$API_URL|g" frontend/js/api.js
          sed -i "s|API_PLACEHOLDER|$API_URL|g" frontend/js/admin.js
          sed -i "s|API_PLACEHOLDER|$API_URL|g" frontend/js/donate.js
          sed -i "s|WSS_PLACEHOLDER|$WS_URL|g" frontend/js/api.js

          # 3. Auto-bump all asset version tags (?v=N) using the short git commit SHA.
          DEPLOY_VERSION="${{ github.sha }}"
          SHORT_SHA="${DEPLOY_VERSION:0:8}"
          echo "Bumping asset versions to: ?v=$SHORT_SHA"
          find frontend/ -name "*.html" -exec \
            sed -i -E "s|\?v=[a-zA-Z0-9]+|?v=$SHORT_SHA|g" {} \;

          # 4. Upload main frontend files to S3 (excluding admin files).
          aws s3 sync frontend/ s3://$BUCKET_NAME/ \
            --delete \
            --cache-control "no-cache, no-store, must-revalidate" \
            --exclude "*.js" --exclude "*.css" \
            --exclude "admin.html" --exclude "css/admin.css" --exclude "js/admin.js"

          aws s3 sync frontend/ s3://$BUCKET_NAME/ \
            --delete \
            --cache-control "public, max-age=31536000, immutable" \
            --exclude "*.html" --exclude "*.json" \
            --include "*.js" --include "*.css" \
            --exclude "css/admin.css" --exclude "js/admin.js"

          # 5. Upload Admin frontend files to Admin S3.
          aws s3 sync frontend/ s3://$ADMIN_BUCKET/ \
            --delete \
            --cache-control "no-cache, no-store, must-revalidate" \
            --exclude "*" \
            --include "admin.html" \
            --include "favicon.svg" \
            --include "favicon.png"

          aws s3 sync frontend/ s3://$ADMIN_BUCKET/ \
            --delete \
            --cache-control "public, max-age=31536000, immutable" \
            --exclude "*" \
            --include "css/admin.css" --include "js/admin.js" \
            --include "css/global.css" --include "css/icons.css" --include "js/icons.js"

          # 6. Invalidate CloudFront caches and wait for completion
          echo "Creating CloudFront invalidation for main site (HTML only — JS/CSS use SHA versioning)..."
          INVALIDATION_ID=$(aws cloudfront create-invalidation \
            --distribution-id $CF_ID \
            --paths "/*.html" "/" \
            --query "Invalidation.Id" --output text)

          echo "Creating CloudFront invalidation for admin site..."
          ADMIN_INVALIDATION_ID=$(aws cloudfront create-invalidation \
            --distribution-id $ADMIN_CF_ID \
            --paths "/admin.html" "/favicon.svg" "/favicon.png" \
            --query "Invalidation.Id" --output text)

          echo "Waiting for main invalidation $INVALIDATION_ID to complete..."
          aws cloudfront wait invalidation-completed \
            --distribution-id $CF_ID \
            --id $INVALIDATION_ID

          echo "Waiting for admin invalidation $ADMIN_INVALIDATION_ID to complete..."
          aws cloudfront wait invalidation-completed \
            --distribution-id $ADMIN_CF_ID \
            --id $ADMIN_INVALIDATION_ID

          echo "✅ Deployment complete!"
          echo "🌐 Main Live URL: $CF_DOMAIN"
          echo "🌐 Admin Live URL: $ADMIN_CF_DOMAIN"
          echo "🔖 Version: $SHORT_SHA"

      - name: Notify on failure
        if: failure()
        run: |
          echo "❌ Notepay frontend deploy failed on commit ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
