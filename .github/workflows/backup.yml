name: Daily DB Backup

on:
  schedule:
    # Runs at 2:00 AM UTC every day
    - cron: '0 2 * * *'
  workflow_dispatch: # Allows you to manually trigger a backup anytime from GitHub

jobs:
  backup:
    runs-on: ubuntu-latest
    steps:
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-south-1

      - name: Install PostgreSQL Client 17
        run: |
          sudo sh -c 'echo "deb http://apt.postgresql.org/pub/repos/apt $(lsb_release -cs)-pgdg main" > /etc/apt/sources.list.d/pgdg.list'
          curl -fsSL https://www.postgresql.org/media/keys/ACCC4CF8.asc | sudo gpg --dearmor -o /etc/apt/trusted.gpg.d/postgresql.gpg
          sudo apt-get update
          sudo apt-get install -y postgresql-client-17

      - name: Dump database & Upload to S3
        run: |
          # 1. Fetch the Database URL securely from AWS Parameter Store
          DATABASE_URL=$(aws ssm get-parameter --name "/notepay/database_url" --with-decryption --query "Parameter.Value" --output text)
          
          # 2. Dump the database (this takes a snapshot of all data)
          pg_dump $DATABASE_URL -Fc -f backup_$(date +%Y%m%d).dump
          
          # 3. Create a unique, private S3 bucket for backups if it doesn't exist
          ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          BUCKET_NAME="notepay-db-backups-$ACCOUNT_ID"
          aws s3 mb s3://$BUCKET_NAME || true
          
          # 4. Upload the backup file to the secure bucket
          aws s3 cp backup_*.dump s3://$BUCKET_NAME/$(date +%Y%m%d).dump
