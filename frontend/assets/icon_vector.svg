<svg viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="leftGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f347d"/>
      <stop offset="100%" stop-color="#05143a"/>
    </linearGradient>

    <linearGradient id="diagGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2a7cf7"/>
      <stop offset="100%" stop-color="#0f3c9e"/>
    </linearGradient>

    <linearGradient id="rightGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#195fd4"/>
      <stop offset="100%" stop-color="#0c2d6e"/>
    </linearGradient>

    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#99d4ff"/>
      <stop offset="100%" stop-color="#e6f5ff"/>
    </linearGradient>
    
    <filter id="dropShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="4" stdDeviation="3" flood-color="#000" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- Left Stem -->
  <path d="M 22 35 L 42 55 L 42 85 C 42 95, 22 95, 22 85 Z" fill="url(#leftGrad)"/>

  <!-- Right Stem -->
  <path d="M 58 45 L 78 20 L 78 85 C 78 95, 58 95, 58 85 Z" fill="url(#rightGrad)"/>

  <!-- Diagonal Ribbon (with shadow to pop out) -->
  <path d="M 22 35 C 22 10, 42 10, 52 20 L 78 55 C 78 80, 58 80, 48 70 L 22 35 Z" fill="url(#diagGrad)" filter="url(#dropShadow)"/>

  <!-- Accents -->
  <path d="M 68 40 L 88 40 L 85 46 L 65 46 Z" fill="url(#accentGrad)"/>
  <path d="M 66 52 L 86 52 L 83 58 L 63 58 Z" fill="url(#accentGrad)"/>
</svg>
