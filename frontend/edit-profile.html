<!DOCTYPE html>
<html lang="en">
<head>
  <base href="/" />
<script src="js/page-init.js"></script>

  <meta charset="UTF-8"/>
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
  <meta http-equiv="Pragma" content="no-cache" />
  <meta http-equiv="Expires" content="0" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
  <title>Notepay — Edit Profile</title>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Nunito+Sans:wght@400;600;700;800&display=swap" rel="stylesheet"/>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
  <link rel="stylesheet" href="css/global.css?v=31">
  <link rel="stylesheet" href="css/icons.css?v=31" />
  <script>
    if (localStorage.getItem("np_dark") || localStorage.getItem("np_admin_theme") === "dark") {
      document.documentElement.classList.add("dark-mode");
      window.addEventListener('DOMContentLoaded', () => document.body.classList.add("dark-mode"));
    }
  </script>
  <style>
    #app-splash {
      position: fixed;
      top: 0; left: 0; width: 100vw; height: 100dvh;
      background: #FFFFFF;
      z-index: 999999;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      transition: opacity 0.15s cubic-bezier(0.4, 0, 0.2, 1), visibility 0.15s;
    }
    .dark-mode #app-splash {
      background: #0A0A0A;
    }
    .splash-logo-box {
      width: 54px;
      height: 54px;
      background: #FFFFFF;
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0;
      box-shadow: 0 0 0 4px rgba(26, 78, 140, 0.4), 0 0 0 8px rgba(26, 78, 140, 0.2), 0 0 0 12px rgba(26, 78, 140, 0.1);
      animation: splash-pulse 1.8s infinite alternate ease-in-out;
      margin-bottom: 36px;
      border: 1px solid rgba(0, 0, 0, 0.08);
    }
    .splash-logo-box img {
      width: 100%;
      height: 100%;
      object-fit: contain;
    }
    .progress-bar {
      width: 78px;
      height: 4px;
      background: rgba(0, 0, 0, 0.08);
      border-radius: 2px;
      overflow: hidden;
      position: relative;
      margin-top: 4px;
    }
    .progress-line {
      width: 40%;
      height: 100%;
      background: #1A4E8C;
      border-radius: 2px;
      position: absolute;
      animation: progress-sweep 1.2s infinite ease-in-out;
    }
    .dark-mode .progress-line {
      background: #60A5FA;
    }
    @keyframes progress-sweep {
      0% { left: -40%; }
      50% { width: 60%; }
      100% { left: 100%; }
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    @keyframes splash-pulse {
      0% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(26, 78, 140, 0.4), 0 0 0 4px rgba(26, 78, 140, 0.25), 0 0 0 8px rgba(26, 78, 140, 0.1); }
      100% { transform: scale(1.1); box-shadow: 0 0 0 8px rgba(26, 78, 140, 0), 0 0 0 16px rgba(26, 78, 140, 0), 0 0 0 24px rgba(26, 78, 140, 0); }
    }
  </style>
  <style>
    html,body{height:100%;overflow:hidden;margin:0;padding:0;}
    .page{height:100dvh;height:100svh;overflow:hidden;display:flex;flex-direction:column;background:var(--surface);width:100%;max-width:480px;margin:0 auto;box-shadow:0 0 0 1px var(--border);transition: background 0.3s, color 0.3s;}
    .status-bar{display:none;}
    .ab{background:var(--primary-dk);display:flex;align-items:center;padding:10px 16px 14px;gap:8px;position:sticky;top:0;z-index:100;}
    .back{color:rgba(255,255,255,.85);font-size:22px;cursor:pointer;padding:3px 7px;border-radius:8px;line-height:1;}
    .ab-ttl{flex:1;text-align:center;font-family:'Nunito',sans-serif;font-size:16px;font-weight:900;color:white;}
    .scr{flex:1;overflow-y:auto;padding:24px 20px 40px;}
    .scr::-webkit-scrollbar{display:none;}
    .avatar-wrap{display:flex;justify-content:center;margin-bottom: 36px;}
    .avatar{width:80px;height:80px;background:var(--primary-dk);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:26px;font-weight:900;color:white;font-family:'Nunito',sans-serif;border:3px solid var(--border2);}
    .field-wrap{margin-bottom:14px;}
    .field-label-out{font-size:11px;font-weight:800;color:var(--text3);letter-spacing:.5px;text-transform:uppercase;margin-bottom:6px;}
    .field{width:100%;background:var(--input-bg);border:2px solid var(--input-border);border-radius:14px;padding:13px 15px;transition:border-color .18s,box-shadow .18s;}
    .field:focus-within{border-color:var(--input-focus);box-shadow:0 0 0 3px rgba(26,78,140,.08);}
    .field input{width:100%;border:none;outline:none;background:transparent;font-size:15px;font-weight:800;color:var(--text);font-family:'Nunito',sans-serif;}
    .field input::placeholder{color:var(--text3);font-weight:600;}
    .gender-lbl{font-size:12px;font-weight:800;color:var(--text);margin-bottom:8px;}
    .gender-row{display:flex;gap:8px;margin-bottom:14px;}
    .gp{flex:1;text-align:center;padding:10px 0;border-radius:12px;font-size:13.5px;font-weight:800;font-family:'Nunito',sans-serif;cursor:pointer;border:2px solid var(--border);color:var(--text2);background:var(--input-bg);transition:all .15s;user-select:none;}
    .gp.sel{background:var(--primary);color:white;border-color:var(--primary);}
    .phone-show{width:100%;background:var(--input-bg);border:2px solid var(--border2);border-radius:14px;padding:13px 15px;margin-bottom:20px;display:flex;justify-content:space-between;align-items:center;}
    .ph-lbl{font-size:9.5px;font-weight:800;color:var(--text3);letter-spacing:.6px;text-transform:uppercase;margin-bottom:3px;}
    .ph-val{font-size:15px;font-weight:800;color:var(--text2);font-family:'Nunito',sans-serif;}
    .ph-vrfd{font-size:11.5px;font-weight:800;color:var(--green);}
    /* Buttons centralized in global.css */
    .error-msg{display:none;font-size:12px;color:var(--red);font-weight:700;margin-bottom:12px;line-height:1.5;}
    .error-msg.visible{display:block;}
    .spinner{display:none;width:18px;height:18px;border:2.5px solid rgba(255,255,255,.35);border-top-color:white;border-radius:50%;animation:spin .7s linear infinite;margin:0 auto;}
    @keyframes spin{to{transform:rotate(360deg)}}
  </style>
<link rel="icon" type="image/png" href="favicon.png" />
<link rel="icon" type="image/svg+xml" href="favicon.svg" />
  <link rel="stylesheet" href="css/components.css?v=32"/>
  <link rel="stylesheet" href="css/forms.css?v=32"/>
</head>
<body style="margin:0; padding:0; overflow:hidden;">

  
<div class="page" style="overflow:hidden;">
  <div class="ab">
    <div class="back" onclick="window.location.replace(getCleanUrl('profile.html'))"><span data-np-icon="arrow-left" data-np-size="22"></span></div>
    <div class="ab-ttl">Edit Profile</div>
    <div style="width:32px"></div>
  </div>
  <div class="scr">
    <div class="avatar-wrap"><div class="avatar" id="av">?</div></div>

    <div class="error-msg" id="err-box"><span id="err-txt"></span></div>

    <div class="field-wrap">
      <div class="field-label-out">Full Name <span style="color:var(--red);">*</span></div>
      <div class="field"><input type="text" id="full-name" placeholder="Your full name" maxlength="60" autocomplete="name"/></div>
    </div>

    <div class="gender-lbl">Gender</div>
    <div class="gender-row">
      <div class="gp" id="g-male"   onclick="selGender('Male', 'g-male')">Male</div>
      <div class="gp" id="g-female" onclick="selGender('Female', 'g-female')">Female</div>
      <div class="gp" id="g-other"  onclick="selGender('Prefer not to say', 'g-other')">Other</div>
    </div>

    <div class="phone-show">
      <div><div class="ph-lbl">Mobile Number</div><div class="ph-val" id="ph-val">—</div></div>
      <div class="ph-vrfd"><span data-np-icon="badge-check" data-np-size="14" data-np-tone="green"></span> Verified</div>
    </div>

    <button class="btn btn-solid-primary" id="save-btn" type="button">
      <span class="btn-text">Save Changes</span>
      <span class="spinner"></span>
    </button>
  </div>
</div>

  <script src="js/firebase-config.js?v=31"></script>
  <script src="js/shared-utils.js?v=31"></script>
  <script src="js/api.js?v=31"></script>
  <script src="js/icons.js?v=31"></script>
  <script src="js/auth-guard.js?v=31"></script>
<script>
  let selectedGender = null;

  function selGender(val, id) {
    selectedGender = val;
    ["g-male", "g-female", "g-other"].forEach(x => {
      document.getElementById(x).classList.toggle("sel", x === id);
    });
  }

  waitForAuthReady().then(async () => {
    try {
      const raw = localStorage.getItem("np_profile");
      const p   = raw ? JSON.parse(raw) : await getMyProfile();
      document.getElementById("full-name").value = p.full_name;
      document.getElementById("ph-val").textContent = p.phone_number;

      // Avatar & gender
      applyAvatar(document.getElementById("av"), p.full_name);
      
      let gid = "g-other";
      if (p.gender === "Male") gid = "g-male";
      if (p.gender === "Female") gid = "g-female";
      selGender(p.gender || null, gid);
    } catch(e) {}
  });

  document.getElementById("full-name").addEventListener("input", function() {
    applyAvatar(document.getElementById("av"), this.value);
  });

  document.getElementById("save-btn").addEventListener("click", async () => {
    const name = document.getElementById("full-name").value.trim();
    const errBox = document.getElementById("err-box");
    const errTxt = document.getElementById("err-txt");
    const btn    = document.getElementById("save-btn");
    if (!name) { errTxt.textContent="Full name is required."; errBox.classList.add("visible"); return; }
    if (!selectedGender) { errTxt.textContent="Please select your gender."; errBox.classList.add("visible"); return; }
    errBox.classList.remove("visible");
    btn.classList.add("loading"); btn.disabled = true;
    try {
      await updateProfile({ full_name: name, gender: selectedGender });
      localStorage.removeItem("np_profile"); // force reload
      showToast("Profile updated!");
      window.location.replace(getCleanUrl('profile.html'));
    } catch(e) {
      errTxt.textContent = e.message || "Update failed.";
      errBox.classList.add("visible");
      btn.classList.remove("loading"); btn.disabled = false;
    }
  });
</script>
  <script>
    window.addEventListener("load", () => {
        const splash = document.getElementById("app-splash");
        if (splash) {
            splash.classList.add("hidden");
            setTimeout(() => splash.style.display = "none", 400);
        }
    });
  </script>
    // Tab state is in localStorage (np_dash_tab) — no URL param passing needed
    // All links to dashboard.html or profile.html navigate cleanly without tab params
</body>
</html>
