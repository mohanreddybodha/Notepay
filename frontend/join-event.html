<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no"/>
  <title>Notepay — Join Event</title>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Nunito+Sans:wght@400;600;700;800&display=swap" rel="stylesheet"/>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
  <link rel="stylesheet" href="css/global.css"/>
  <script>
    if (localStorage.getItem("np_dark")) {
      document.documentElement.classList.add("dark-mode");
      window.addEventListener('DOMContentLoaded', () => document.body.classList.add("dark-mode"));
    }
  </script>
  <style>
    .page{min-height:100dvh;display:flex;flex-direction:column;background:var(--surface);max-width:480px;margin:0 auto;box-shadow:0 0 0 1px var(--border);}
    .status-bar{background:var(--primary-dk);display:flex;justify-content:space-between;padding:10px 20px 8px;font-size:11px;font-weight:800;color:rgba(255,255,255,.85);font-family:'Nunito',sans-serif;}
    .ab{background:var(--primary-dk);display:flex;align-items:center;padding:10px 16px 14px;gap:8px;}
    .back{color:rgba(255,255,255,.85);font-size:22px;cursor:pointer;padding:3px 7px;border-radius:8px;line-height:1;}
    .ab-ttl{flex:1;text-align:center;font-family:'Nunito',sans-serif;font-size:16px;font-weight:900;color:white;}
    .scr{flex:1;overflow-y:auto;padding:24px 20px 40px;}
    .scr::-webkit-scrollbar{display:none;}
    .join-title{font-family:'Nunito',sans-serif;font-size:16px;font-weight:800;color:var(--text);margin-bottom:18px;}
    .field-wrap{margin-bottom:14px;}
    .field-label-out{font-size:11px;font-weight:800;color:var(--text3);letter-spacing:.5px;text-transform:uppercase;margin-bottom:6px;}
    .field{width:100%;background:var(--input-bg);border:2px solid var(--input-border);border-radius:14px;padding:13px 15px;transition:border-color .18s,box-shadow .18s;}
    .field:focus-within{border-color:var(--input-focus);box-shadow:0 0 0 3px rgba(26,78,140,.08);}
    .field.err{border-color:var(--red);}
    .field.warn{border-color:var(--amber);}
    .field input{width:100%;border:none;outline:none;background:transparent;font-size:16px;font-weight:800;color:var(--text);font-family:'Nunito',sans-serif;letter-spacing:1px;text-transform:uppercase;}
    .field input::placeholder{color:var(--text3);font-weight:600;letter-spacing:0;text-transform:none;}
    .warn-note{background:#FFF8E6;border:1.5px solid #E8C870;border-radius:10px;padding:10px 12px;font-size:12px;color:#7A5800;font-weight:700;display:flex;gap:7px;margin-bottom:14px;}
    .err-note{background:#FFF0EC;border:1.5px solid #D4906A;border-radius:10px;padding:10px 12px;font-size:12px;color:var(--red);font-weight:700;display:none;gap:7px;margin-bottom:14px;}
    .err-note.visible{display:flex;}
    .btn-join{width:100%;background:var(--btn-primary);border-radius:18px;padding:14px;text-align:center;font-family:'Nunito',sans-serif;font-size:15px;font-weight:900;color:white;cursor:pointer;border:none;box-shadow:0 4px 0 rgba(0,0,0,.26);transition:transform .12s,box-shadow .12s;}
    .btn-join:hover{transform:translateY(-1px);}
    .btn-join:active{transform:translateY(1px);box-shadow:0 2px 0 rgba(0,0,0,.26);}
    .btn-join:disabled{background:var(--input-border);box-shadow:none;cursor:not-allowed;transform:none;}
    .btn-cancel{width:100%;text-align:center;color:var(--text3);font-size:14px;font-weight:700;cursor:pointer;padding:10px 0;background:none;border:none;margin-top:8px;}
    .spinner{display:none;width:18px;height:18px;border:2.5px solid rgba(255,255,255,.35);border-top-color:white;border-radius:50%;animation:spin .7s linear infinite;margin:0 auto;}
    @keyframes spin{to{transform:rotate(360deg)}}
    .btn-join.loading .btn-text{display:none;}
    .btn-join.loading .spinner{display:block;}
  </style>
</head>
<body>
<div class="page">
  <div class="ab">
    <div class="back" onclick="history.back()">←</div>
    <div class="ab-ttl">Join by Event Code</div>
    <div style="width:32px"></div>
  </div>
  <div class="scr">
    <div class="join-title">Enter the code shared by your organizer</div>

    <div class="field-wrap">
      <div class="field-label-out">Event Code</div>
      <div class="field" id="code-field">
        <input type="text" id="code-input" placeholder="NP-2025-XXXX" maxlength="20" autocomplete="off" autocorrect="off" spellcheck="false"/>
      </div>
    </div>

    <div class="warn-note" id="warn-note" style="display:none;">⚠️ This event is currently deactivated. Contact your organizer.</div>
    <div class="err-note" id="err-note"><span>⚠️</span><span id="err-txt">Invalid event code. Please check and try again.</span></div>

    <button class="btn-join" id="join-btn" type="button">
      <span class="btn-text">Join Event</span>
      <span class="spinner"></span>
    </button>
    <button class="btn-cancel" onclick="history.back()">Cancel</button>
  </div>
</div>

<script src="js/firebase-config.js"></script>
<script src="js/api.js"></script>
<script src="js/auth-guard.js"></script>
<script>
  document.getElementById("code-input").addEventListener("input", function() {
    this.value = this.value.toUpperCase().replace(/[^A-Z0-9-]/g,"");
    document.getElementById("code-field").classList.remove("err","warn");
    document.getElementById("err-note").classList.remove("visible");
    document.getElementById("warn-note").style.display="none";
  });

  document.getElementById("join-btn").addEventListener("click", async () => {
    const code = document.getElementById("code-input").value.trim();
    const btn  = document.getElementById("join-btn");
    const err  = document.getElementById("err-note");
    const errTxt = document.getElementById("err-txt");

    if (!code) { errTxt.textContent="Please enter an event code."; err.classList.add("visible"); return; }

    btn.classList.add("loading"); btn.disabled = true;
    err.classList.remove("visible");

    try {
      await joinEvent(code);
      showToast("Joined event!");
      window.location.replace("dashboard.html");
    } catch(e) {
      const msg = e.message || "";
      if (msg.toLowerCase().includes("deactivated")) {
        document.getElementById("code-field").classList.add("warn");
        document.getElementById("warn-note").style.display="flex";
      } else {
        document.getElementById("code-field").classList.add("err");
        errTxt.textContent = msg.includes("Invalid") ? "Invalid event code. Please check and try again." : msg;
        err.classList.add("visible");
      }
      btn.classList.remove("loading"); btn.disabled = false;
    }
  });
</script>
</body>
</html>
