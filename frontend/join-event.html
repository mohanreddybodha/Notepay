<!DOCTYPE html>
<html lang="en">
<head>
<script>
if (window.location.hostname !== 'localhost' && window.location.hostname !== '127.0.0.1' && window.location.protocol !== 'file:' && window.location.pathname.endsWith('.html')) {
  let cleanPath = window.location.pathname.replace(/\.html$/, '');
  if (cleanPath === '/index') cleanPath = '/';
  window.history.replaceState(null, '', cleanPath + window.location.search + window.location.hash);
}
</script>
  <meta charset="UTF-8"/>
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
  <meta http-equiv="Pragma" content="no-cache" />
  <meta http-equiv="Expires" content="0" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, interactive-widget=resizes-content"/>
  <title>Notepay — Join Event</title>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Nunito+Sans:wght@400;600;700;800&display=swap" rel="stylesheet"/>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
  <link rel="stylesheet" href="css/global.css?v=25"/>
  <link rel="stylesheet" href="css/icons.css?v=25" />
  <script>
    if (localStorage.getItem("np_dark") || localStorage.getItem("np_admin_theme") === "dark") {
      document.documentElement.classList.add("dark-mode");
      window.addEventListener('DOMContentLoaded', () => document.body.classList.add("dark-mode"));
    }
  </script>
  <style>
    #app-splash {
      position: fixed;
      top: 0; left: 0; width: 100vw; height: 100dvh;
      background: #FFFFFF;
      z-index: 999999;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      transition: opacity 0.15s cubic-bezier(0.4, 0, 0.2, 1), visibility 0.15s;
    }
    .dark-mode #app-splash {
      background: #0A0A0A;
    }
    .splash-logo-box {
      width: 54px;
      height: 54px;
      background: #FFFFFF;
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0;
      box-shadow: 0 0 0 4px rgba(26, 78, 140, 0.4), 0 0 0 8px rgba(26, 78, 140, 0.2), 0 0 0 12px rgba(26, 78, 140, 0.1);
      animation: splash-pulse 1.8s infinite alternate ease-in-out;
      margin-bottom: 24px;
      border: 1px solid rgba(0, 0, 0, 0.08);
    }
    .dark-mode .splash-logo-box {
      background: #FFFFFF;
      border: 1px solid rgba(255, 255, 255, 0.15);
      box-shadow: 0 0 0 4px rgba(255, 255, 255, 0.3), 0 0 0 8px rgba(255, 255, 255, 0.15), 0 0 0 12px rgba(255, 255, 255, 0.05);
      animation: splash-pulse-dark 1.8s infinite alternate ease-in-out;
    }
    .splash-logo-box img {
      width: 100%;
      height: 100%;
      object-fit: contain;
    }
    .loader {
      width: 28px;
      height: 28px;
      border: 3px solid rgba(0, 0, 0, 0.1);
      border-top-color: #1A4E8C;
      border-radius: 50%;
      animation: spin .7s linear infinite;
    }
    .dark-mode .loader {
      border: 3px solid rgba(255, 255, 255, 0.1);
      border-top-color: #60A5FA;
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    @keyframes splash-pulse {
      0% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(26, 78, 140, 0.4), 0 0 0 4px rgba(26, 78, 140, 0.25), 0 0 0 8px rgba(26, 78, 140, 0.1); }
      100% { transform: scale(1.1); box-shadow: 0 0 0 8px rgba(26, 78, 140, 0), 0 0 0 16px rgba(26, 78, 140, 0), 0 0 0 24px rgba(26, 78, 140, 0); }
    }
    @keyframes splash-pulse-dark {
      0% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(255, 255, 255, 0.3), 0 0 0 4px rgba(255, 255, 255, 0.2), 0 0 0 8px rgba(255, 255, 255, 0.1); }
      100% { transform: scale(1.1); box-shadow: 0 0 0 8px rgba(255, 255, 255, 0), 0 0 0 16px rgba(255, 255, 255, 0), 0 0 0 24px rgba(255, 255, 255, 0); }
    }
  </style>
  <style>
    html,body{height:100%;overflow:hidden;margin:0;padding:0;}
    .page{height:100dvh;height:100svh;overflow:hidden;display:flex;flex-direction:column;background:var(--surface);max-width:480px;margin:0 auto;box-shadow:0 0 0 1px var(--border);}
    .status-bar{background:var(--primary-dk);display:flex;justify-content:space-between;padding:10px 20px 8px;font-size:11px;font-weight:800;color:rgba(255,255,255,.85);font-family:'Nunito',sans-serif;}
    .ab{background:var(--primary-dk);display:flex;align-items:center;padding:10px 16px 14px;gap:8px;position:sticky;top:0;z-index:100;}
    .back{color:rgba(255,255,255,.85);font-size:22px;cursor:pointer;padding:3px 7px;border-radius:8px;line-height:1;}
    .ab-ttl{flex:1;text-align:center;font-family:'Nunito',sans-serif;font-size:16px;font-weight:900;color:white;}
    .scr{flex:1;overflow-y:auto;padding:24px 20px 40px;}
    .scr::-webkit-scrollbar{display:none;}
    .join-title{font-family:'Nunito',sans-serif;font-size:16px;font-weight:800;color:var(--text);margin-bottom:18px;}
    .field-wrap{margin-bottom:14px;}
    .field-label-out{font-size:11px;font-weight:800;color:var(--text3);letter-spacing:.5px;text-transform:uppercase;margin-bottom:6px;}
    .field{width:100%;background:var(--input-bg);border:2px solid var(--input-border);border-radius:14px;padding:13px 15px;transition:border-color .18s,box-shadow .18s;}
    .field:focus-within{border-color:var(--input-focus);box-shadow:0 0 0 3px rgba(26,78,140,.08);}
    .field.err{border-color:var(--red);}
    .field.warn{border-color:var(--amber);}
    .field input{width:100%;border:none;outline:none;background:transparent;font-size:16px;font-weight:800;color:var(--text);font-family:'Nunito',sans-serif;letter-spacing:1px;text-transform:uppercase;}
    .field input::placeholder{color:var(--text3);font-weight:600;letter-spacing:0;text-transform:none;}
    .warn-note{font-size:12px;color:var(--amber);font-weight:700;display:none;margin-top:6px;margin-bottom:14px;line-height:1.5;background:none !important;border:none !important;padding:0 !important;}
    .err-note{font-size:12px;color:var(--red);font-weight:700;display:none;margin-top:6px;margin-bottom:14px;line-height:1.5;background:none !important;border:none !important;padding:0 !important;}
    .err-note.visible{display:block;}
    /* Buttons in global.css */
    /* Spinner */
    .spinner{display:none;width:18px;height:18px;border:2.5px solid rgba(255,255,255,.35);border-top-color:white;border-radius:50%;animation:spin .7s linear infinite;margin:0 auto;}
    @keyframes spin{to{transform:rotate(360deg)}}
    .btn-join.loading .btn-text{display:none;}
    .btn-join.loading .spinner{display:block;}
    .footer{text-align:center;font-size:11px;color:var(--text3);font-weight:600;padding:12px 0 0;}
  </style>
<link rel="icon" type="image/png" href="favicon.png" />
<link rel="icon" type="image/svg+xml" href="favicon.svg" />
</head>
<body style="margin:0; padding:0; overflow:hidden;">
  <!-- SPLASH SCREEN -->
  <div id="app-splash">
    <div class="splash-logo-box">
      <img src="favicon.svg" alt="Notepay Logo" />
    </div>
    <div class="loader"></div>
  </div>
<div class="page" style="overflow:hidden;">
  <div class="ab">
    <div class="back" onclick="history.back()"><span data-np-icon="arrow-left" data-np-size="22"></span></div>
    <div class="ab-ttl">Join by Event Code</div>
    <div style="width:32px"></div>
  </div>
  <div class="scr">
    <div class="join-title">Enter the code shared by your organizer</div>

    <div class="field-wrap">
      <div class="field-label-out">Event Code <span style="color:var(--red);">*</span></div>
      <div class="field" id="code-field">
        <input type="text" id="code-input" placeholder="Enter event code" maxlength="16" autocomplete="off" autocorrect="off" spellcheck="false" />
      </div>
    </div>

    <div class="warn-note" id="warn-note" style="display:none;"><span>This event is currently deactivated. Contact your organizer.</span></div>
    <div class="err-note" id="err-note"><span id="err-txt">Invalid event code. Please check and try again.</span></div>

    <button class="btn btn-solid-primary" id="join-btn" type="submit">
      <span class="btn-text">Join Event</span>
      <span class="spinner"></span>
    </button>
    <button type="button" class="btn btn-text-secondary" onclick="window.location.href=getCleanUrl('dashboard.html')">Cancel</button>

    <div class="footer">Notepay v1.0 &middot; Made with <span data-np-icon="heart" data-np-size="14"></span> in India</div>
  </div>
</div>

<script src="js/firebase-config.js?v=25"></script>
<script src="js/icons.js?v=25"></script>
<script src="js/api.js?v=25"></script>
<script src="js/auth-guard.js?v=25"></script>
<script>
  document.getElementById("code-input").addEventListener("input", function() {
    this.value = this.value.toUpperCase().replace(/[^A-Z0-9-]/g,"");
    document.getElementById("code-field").classList.remove("err","warn");
    document.getElementById("err-note").classList.remove("visible");
    document.getElementById("warn-note").style.display="none";
  });

  document.getElementById("join-btn").addEventListener("click", async () => {
    const code = document.getElementById("code-input").value.trim();
    const btn  = document.getElementById("join-btn");
    const err  = document.getElementById("err-note");
    const errTxt = document.getElementById("err-txt");

    if (!code) { errTxt.textContent="Please enter an event code."; err.classList.add("visible"); return; }
    if (code.length !== 16) { errTxt.textContent = "Event code must be 16 characters."; err.classList.add("visible"); return; }

    btn.classList.add("loading"); btn.disabled = true;
    err.classList.remove("visible");

    try {
      await joinEvent(code);
      showToast("Joined event!");
      window.location.replace(getCleanUrl("dashboard.html") + "?tab=1");
    } catch(e) {
      const msg = e.message || "";
      if (msg.toLowerCase().includes("deactivated")) {
        document.getElementById("code-field").classList.add("warn");
        document.getElementById("warn-note").style.display="flex";
      } else {
        document.getElementById("code-field").classList.add("err");
        errTxt.textContent = msg.includes("Invalid") ? "Invalid event code. Please check and try again." : msg;
        err.classList.add("visible");
      }
      btn.classList.remove("loading"); btn.disabled = false;
    }
  });
</script>
  <script>
    window.addEventListener("load", () => {
        const splash = document.getElementById("app-splash");
        if (splash) {
            splash.classList.add("hidden");
            setTimeout(() => splash.style.display = "none", 400);
        }
    });
  </script>
</body>
</html>
