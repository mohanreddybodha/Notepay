<!DOCTYPE html>
<html>
<head>
<script>
if (window.location.hostname !== 'localhost' && window.location.hostname !== '127.0.0.1' && window.location.protocol !== 'file:' && window.location.pathname.endsWith('.html')) {
  let cleanPath = window.location.pathname.replace(/\.html$/, '');
  if (cleanPath === '/index') cleanPath = '/';
  window.history.replaceState(null, '', cleanPath + window.location.search + window.location.hash);
}
</script>
  <meta charset="UTF-8">
  <title>Redirecting...</title>
  <script>
    // This page is served when CloudFront gets a 404.
    // It reconstructs the correct .html URL and redirects the user.
    var path = window.location.pathname;
    var search = window.location.search;
    var hash = window.location.hash;

    // Map clean paths back to .html files
    var knownPages = ['/event', '/dashboard', '/login', '/join-event', '/create-event', '/profile', '/edit-profile', '/profile-setup', '/privacy', '/terms', '/guide', '/contact'];
    var matched = knownPages.find(function(p) { return path === p || path.startsWith(p + '?'); });

    if (path === '/signup') {
      window.location.replace('/login.html' + search + hash);
    } else if (matched) {
      window.location.replace(matched + '.html' + search + hash);
    } else {
      window.location.replace('/login.html');
    }
  </script>
<link rel="icon" type="image/png" href="favicon.png" />
<link rel="icon" type="image/svg+xml" href="favicon.svg" />
  <style>
    #app-splash {
      position: fixed;
      top: 0; left: 0; width: 100vw; height: 100dvh;
      background: #FFFFFF;
      z-index: 999999;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      transition: opacity 0.15s cubic-bezier(0.4, 0, 0.2, 1), visibility 0.15s;
    }
    .dark-mode #app-splash {
      background: #0A0A0A;
    }
    .splash-logo-box {
      width: 54px;
      height: 54px;
      background: #FFFFFF;
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0;
      box-shadow: 0 0 0 4px rgba(26, 78, 140, 0.4), 0 0 0 8px rgba(26, 78, 140, 0.2), 0 0 0 12px rgba(26, 78, 140, 0.1);
      animation: splash-pulse 1.8s infinite alternate ease-in-out;
      margin-bottom: 36px;
      border: 1px solid rgba(0, 0, 0, 0.08);
    }
    .splash-logo-box img {
      width: 100%;
      height: 100%;
      object-fit: contain;
    }
    .progress-bar {
      width: 78px;
      height: 4px;
      background: rgba(0, 0, 0, 0.08);
      border-radius: 2px;
      overflow: hidden;
      position: relative;
      margin-top: 4px;
    }
    .progress-line {
      width: 40%;
      height: 100%;
      background: #1A4E8C;
      border-radius: 2px;
      position: absolute;
      animation: progress-sweep 1.2s infinite ease-in-out;
    }
    .dark-mode .progress-line {
      background: #60A5FA;
    }
    @keyframes progress-sweep {
      0% { left: -40%; }
      50% { width: 60%; }
      100% { left: 100%; }
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    @keyframes splash-pulse {
      0% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(26, 78, 140, 0.4), 0 0 0 4px rgba(26, 78, 140, 0.25), 0 0 0 8px rgba(26, 78, 140, 0.1); }
      100% { transform: scale(1.1); box-shadow: 0 0 0 8px rgba(26, 78, 140, 0), 0 0 0 16px rgba(26, 78, 140, 0), 0 0 0 24px rgba(26, 78, 140, 0); }
    }
  </style>
  <link rel="stylesheet" href="css/global.css?v=32"/>
  <link rel="stylesheet" href="css/components.css?v=32"/>
  <link rel="stylesheet" href="css/forms.css?v=32"/>
</head>
<body style="font-family:sans-serif; text-align:center; padding:40px; color:#666;">
  
  Redirecting...
  <script>
    window.addEventListener("load", () => {
        const splash = document.getElementById("app-splash");
        if (splash) {
            splash.classList.add("hidden");
            setTimeout(() => splash.style.display = "none", 400);
        }
    });
  </script>
</body>
</html>
