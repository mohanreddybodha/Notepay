<!DOCTYPE html>
<html lang="en">
<head>
<script>
if (window.location.hostname !== 'localhost' && window.location.hostname !== '127.0.0.1' && window.location.protocol !== 'file:' && window.location.pathname.endsWith('.html')) {
  let cleanPath = window.location.pathname.replace(/\.html$/, '');
  if (cleanPath === '/index') cleanPath = '/';
  window.history.replaceState(null, '', cleanPath + window.location.search + window.location.hash);
}
</script>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Contact Us — Notepay</title>
  <meta name="description" content="Get in touch with the Notepay support team for any queries regarding event budgeting or UPI donation ledgers.">
  
  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Plus+Jakarta+Sans:wght@500;600;700;800&display=swap" rel="stylesheet">
  
  <link rel="icon" type="image/png" href="favicon.png" />
  <link rel="icon" type="image/svg+xml" href="favicon.svg" />

  <style>
    :root {
      --bg: #030712;
      --card-bg: rgba(17, 24, 39, 0.65);
      --card-border: rgba(255, 255, 255, 0.08);
      --primary: #4f46e5;
      --primary-hover: #4338ca;
      --primary-glow: rgba(79, 70, 229, 0.35);
      --accent-cyan: #06b6d4;
      --accent-emerald: #10b981;
      --text-main: #f9fafb;
      --text-muted: #9ca3af;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html, body {
      background-color: var(--bg);
      color: var(--text-main);
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* Grid Overlay */
    .bg-grid {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 100%;
      background-image: 
        linear-gradient(rgba(255, 255, 255, 0.02) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255, 255, 255, 0.02) 1px, transparent 1px);
      background-size: 50px 50px;
      background-position: center top;
      mask-image: linear-gradient(to bottom, black 50%, transparent 100%);
      -webkit-mask-image: linear-gradient(to bottom, black 50%, transparent 100%);
      z-index: -1;
      pointer-events: none;
    }

    /* Background Glow */
    .bg-glow {
      position: absolute;
      top: -10%;
      left: 50%;
      transform: translateX(-50%);
      width: 600px;
      height: 600px;
      background: radial-gradient(circle, var(--primary-glow) 0%, transparent 70%);
      opacity: 0.8;
      filter: blur(80px);
      z-index: -2;
      pointer-events: none;
    }

    /* Navigation Header */
    header {
      height: 72px;
      border-bottom: 1px solid var(--card-border);
      background: rgba(3, 7, 18, 0.75);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
    }

    .nav-container {
      max-width: 1200px;
      margin: 0 auto;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 24px;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
      text-decoration: none;
      font-family: 'Plus Jakarta Sans', sans-serif;
      font-weight: 800;
      font-size: 20px;
      color: var(--text-main);
    }

    .logo img {
      width: 30px;
      height: 30px;
    }

    .back-btn {
      color: var(--text-muted);
      text-decoration: none;
      font-size: 14px;
      font-weight: 500;
      transition: color 0.2s;
    }

    .back-btn:hover {
      color: var(--text-main);
    }

    /* Contact Form Layout */
    .contact-container {
      max-width: 600px;
      margin: 80px auto;
      padding: 0 24px;
    }

    .contact-card {
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      border-radius: 24px;
      padding: 48px 40px;
      box-shadow: 0 30px 60px rgba(0, 0, 0, 0.45);
    }

    h1 {
      font-family: 'Plus Jakarta Sans', sans-serif;
      font-size: 32px;
      font-weight: 800;
      margin-bottom: 12px;
      text-align: center;
    }

    .sub-text {
      color: var(--text-muted);
      font-size: 15px;
      text-align: center;
      margin-bottom: 36px;
      line-height: 1.5;
    }

    /* Form Fields */
    .form-group {
      margin-bottom: 24px;
    }

    .form-label {
      display: block;
      font-size: 12px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--text-muted);
      margin-bottom: 8px;
    }

    .form-input, .form-textarea {
      width: 100%;
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid var(--card-border);
      border-radius: 12px;
      padding: 14px 16px;
      color: var(--text-main);
      font-family: inherit;
      font-size: 15px;
      transition: all 0.2s ease;
      outline: none;
    }

    .form-input:focus, .form-textarea:focus {
      border-color: var(--primary);
      background: rgba(255, 255, 255, 0.05);
      box-shadow: 0 0 0 3px var(--primary-glow);
    }

    .form-textarea {
      min-height: 150px;
      resize: vertical;
    }

    .submit-btn {
      width: 100%;
      background: var(--primary);
      color: white;
      padding: 14px 28px;
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 9999px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s ease;
      box-shadow: 0 4px 14px var(--primary-glow);
    }

    .submit-btn:hover {
      background: var(--primary-hover);
      transform: translateY(-1px);
      box-shadow: 0 6px 18px rgba(79, 70, 229, 0.5);
    }

    /* Contact info list */
    .contact-info {
      margin-top: 40px;
      border-top: 1px solid rgba(255, 255, 255, 0.05);
      padding-top: 32px;
      display: flex;
      justify-content: space-around;
      flex-wrap: wrap;
      gap: 24px;
    }

    .info-item {
      text-align: center;
    }

    .info-lbl {
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-bottom: 4px;
    }

    .info-val {
      font-size: 14px;
      color: var(--text-main);
      text-decoration: none;
      transition: color 0.2s;
    }

    .info-val:hover {
      color: var(--primary);
    }

    /* Footer */
    footer {
      border-top: 1px solid var(--card-border);
      background: #020617;
      padding: 36px 24px;
      color: var(--text-muted);
      font-size: 13px;
      text-align: center;
      margin-top: auto;
    }

    .success-msg {
      display: none;
      background: rgba(16, 185, 129, 0.1);
      border: 1px solid rgba(16, 185, 129, 0.2);
      border-radius: 12px;
      padding: 16px;
      color: var(--accent-emerald);
      text-align: center;
      font-size: 14.5px;
      margin-bottom: 24px;
    }
  </style>
</head>
<body>
  <!-- SPLASH SCREEN -->
  <div id="app-splash">
    <div class="splash-logo-box">
      <img src="favicon.svg" alt="Notepay Logo" />
    </div>
  </div>

  <div class="bg-grid"></div>
  <div class="bg-glow"></div>

  <!-- Header -->
  <header>
    <div class="nav-container">
      <a href="index.html" class="logo">
        <img src="favicon.svg" alt="Notepay Logo" />
        Notepay
      </a>
      <a href="index.html" class="back-btn">&larr; Back to Home</a>
    </div>
  </header>

  <!-- Contact Form Section -->
  <div class="contact-container">
    <div class="contact-card">
      <h1>Get in Touch</h1>
      <p class="sub-text">Have a question or feedback? Drop us a message below and we will get back to you shortly.</p>
      
      <div class="success-msg" id="success-message">
        ✓ Thank you! Your message has been sent successfully.
      </div>

      <form id="contact-form" onsubmit="handleContactSubmit(event)">
        <div class="form-group">
          <label class="form-label">Full Name</label>
          <input type="text" id="contact-name" class="form-input" required placeholder="John Doe">
        </div>
        <div class="form-group">
          <label class="form-label">Email Address</label>
          <input type="email" id="contact-email" class="form-input" required placeholder="john@example.com">
        </div>
        <div class="form-group">
          <label class="form-label">Message</label>
          <textarea id="contact-message" class="form-textarea" required placeholder="How can we help you?"></textarea>
        </div>
        <button type="submit" id="submit-btn" class="submit-btn">Send Message</button>
      </form>
    </div>
  </div>

  <!-- Footer -->
  <footer>
    <p>&copy; 2026 Notepay.</p>
  </footer>

  <script>
    async function handleContactSubmit(e) {
      e.preventDefault();
      
      const name = document.getElementById('contact-name').value.trim();
      const email = document.getElementById('contact-email').value.trim();
      const message = document.getElementById('contact-message').value.trim();
      const btn = document.getElementById('submit-btn');
      
      const originalText = btn.innerText;
      btn.innerText = "Sending...";
      btn.disabled = true;
      
      // Determine API address based on environment (aligned with api.js)
      let API_BASE = "";
      const hostname = window.location.hostname;
      if (hostname === 'localhost' || hostname === '127.0.0.1' || hostname.match(/^[0-9.]+$/)) {
        API_BASE = `http://${hostname}:8000`;
      } else {
        API_BASE = "API_PLACEHOLDER".replace(/\/$/, "");
      }
      
      try {
        const response = await fetch(API_BASE + "/feedback", {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({
            name: name,
            email: email,
            type: "general",
            message: message
          })
        });
        
        if (!response.ok) {
          const errData = await response.json().catch(() => ({}));
          throw new Error(errData.detail || "Failed to submit feedback");
        }
        
        document.getElementById('contact-form').style.display = 'none';
        document.getElementById('success-message').style.display = 'block';
      } catch (err) {
        alert(err.message || "Something went wrong. Please try again.");
        btn.innerText = originalText;
        btn.disabled = false;
      }
    }
  </script>

  <script>
    window.addEventListener("load", () => {
        const splash = document.getElementById("app-splash");
        if (splash) {
            splash.classList.add("hidden");
            setTimeout(() => splash.style.display = "none", 400);
        }
    });
  </script>
</body>
</html>
