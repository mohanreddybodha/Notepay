  <style>
    html,body{height:100%;overflow:hidden;margin:0;padding:0;}
    .page{height:100dvh;height:100svh;overflow:hidden;display:flex;flex-direction:column;background:var(--surface);max-width:480px;margin:0 auto;box-shadow:0 0 0 1px var(--border);}
    .status-bar{background:var(--primary-dk);display:flex;justify-content:space-between;padding:10px 20px 8px;font-size:11px;font-weight:800;color:rgba(255,255,255,.85);font-family:'Nunito',sans-serif;}
    .app-bar{background:var(--primary-dk);display:flex;align-items:center;padding:10px 16px 14px;gap:8px;}
    .logo-row{display:flex;align-items:center;gap:9px;}
    .logo-box{width:34px;height:34px;background:transparent;border-radius:10px;display:flex;align-items:center;justify-content:center;padding:0;overflow:hidden;}
    body.dark-mode .logo-box{background:transparent;border:none;box-shadow:none;}
    .logo-box img, .logo-box svg { width:100%;height:100%;object-fit:cover; }
    .logo-img{width:100%;height:100%;object-fit:cover;border-radius:inherit;}
    .logo-box svg{width:100%;height:100%;}
    .logo-text{font-family:'Nunito',sans-serif;font-size:19px;font-weight:900;color:white;}
    .ab-ttl{position:absolute;left:50%;transform:translateX(-50%);font-family:'Nunito',sans-serif;font-size:15px;font-weight:900;color:white;}
    .close-btn{margin-left:auto;color:rgba(255,255,255,.75);font-size:22px;cursor:pointer;padding:3px 7px;border-radius:8px;transition:background .15s;line-height:1;}
    .close-btn:hover{background:rgba(255,255,255,.12);}
    .scr{flex:1;overflow-y:auto;padding:20px 20px 40px;}
    .scr::-webkit-scrollbar{display:none;}
    .field-wrap{margin-bottom:14px;}
    .field-label-out{font-size:11px;font-weight:800;color:var(--text3);letter-spacing:.5px;text-transform:uppercase;margin-bottom:6px;}
    .field{width:100%;background:var(--input-bg);border:2px solid var(--input-border);border-radius:14px;padding:13px 15px;transition:border-color .18s,box-shadow .18s;}
    .field:focus-within{border-color:var(--input-focus);box-shadow:0 0 0 3px rgba(26,78,140,.08);}
    .field input,.field textarea{width:100%;border:none;outline:none;background:transparent;font-size:15px;font-weight:800;color:var(--text);font-family:'Nunito',sans-serif;resize:none;}
    .field input::placeholder,.field textarea::placeholder{color:var(--text3);font-weight:600;}
    .organizer-note{text-align:center;font-size:12.5px;color:var(--text3);font-weight:600;margin-bottom:18px;}
    .error-msg{display:none;align-items:center;gap:6px;background:#FFF0EC;border:1.5px solid #D4906A;border-radius:10px;padding:9px 12px;font-size:12px;color:var(--red);font-weight:700;width:100%;margin-bottom:12px;}
    .error-msg.visible{display:flex;}
    .footer{text-align:center;font-size:11px;color:var(--text3);font-weight:600;padding:12px 0 0;}
    /* Spinner */
    .spinner{display:none;width:18px;height:18px;border:2.5px solid rgba(255,255,255,.35);border-top-color:white;border-radius:50%;animation:spin .7s linear infinite;margin:0 auto;}
    @keyframes spin{to{transform:rotate(360deg)}}
    /* Toggle Chips */
    .toggle-section{margin-bottom:18px;}
    .toggle-chips{display:flex;gap:10px;margin-top:8px;}
    .tgl-chip{flex:1;display:flex;align-items:center;justify-content:center;gap:8px;padding:13px 10px;border-radius:14px;font-family:'Nunito',sans-serif;font-size:14px;font-weight:800;cursor:pointer;transition:all .2s;border:2px solid var(--input-border);background:var(--input-bg);color:var(--text3);user-select:none;}
    .tgl-chip.active{border-color:#0FA3A3;background:rgba(15,163,163,.08);color:#0FA3A3;}
    .tgl-chip .tgl-icon{font-size:18px;}
    .tgl-chip .tgl-check{width:18px;height:18px;border-radius:50%;border:2px solid var(--input-border);display:flex;align-items:center;justify-content:center;transition:all .2s;flex-shrink:0;}
    .tgl-chip.active .tgl-check{border-color:#0FA3A3;background:#0FA3A3;}
    .toggle-hint{font-size:11.5px;color:var(--text3);text-align:center;margin-top:8px;font-weight:600;}
  </style>

<div class="page" style="overflow:hidden;">
  <div class="app-bar">
    <div class="logo-row">
      <div class="logo-box">
        <img class="logo-img" src="favicon.svg" alt="Notepay" />
      </div>
      <div class="logo-text">Notepay</div>
    </div>
    <div class="ab-ttl">Create Event</div>
    <div class="close-btn" onclick="history.back()"><span data-np-icon="x" data-np-size="22"></span></div>
  </div>

  <div class="scr">
    <div class="field-wrap">
      <div class="field-label-out">Event Name <span style="color:var(--red);">*</span></div>
      <div class="field"><input type="text" id="ev-name" placeholder="e.g. Ganesh Festival 2025" maxlength="100" oninput="document.getElementById('ev-name-error').style.display='none';"/></div>
      <div id="ev-name-error" style="color:var(--red); font-size:12px; margin-top:6px; font-weight:700; display:none;"></div>
    </div>

    <div class="field-wrap">
      <div class="field-label-out">Short Description <span style="color:var(--red);">*</span></div>
      <div class="field"><textarea id="ev-desc" placeholder="e.g. Annual colony donations" rows="2" maxlength="200" oninput="document.getElementById('ev-desc-error').style.display='none';"></textarea></div>
      <div id="ev-desc-error" style="color:var(--red); font-size:12px; margin-top:6px; font-weight:700; display:none;"></div>
    </div>

    <div class="field-wrap">
      <div class="field-label-out">Event Date <span style="color:var(--red);">*</span></div>
      <div class="field"><input type="date" id="ev-date" onchange="document.getElementById('ev-date-error').style.display='none';"/></div>
      <div id="ev-date-error" style="color:var(--red); font-size:12px; margin-top:6px; font-weight:700; display:none;"></div>
    </div>

    <div class="toggle-section">
      <div class="field-label-out">TABLES TO SHOW</div>
      <div class="toggle-chips">
        <div class="tgl-chip active" id="tgl-don" onclick="toggleChip('don')">
          <span class="tgl-check"><span data-np-icon="badge-check" data-np-size="12"></span></span>
          <span class="tgl-icon"><span data-np-icon="download" data-np-size="18"></span></span>
          <span>Collections</span>
        </div>
        <div class="tgl-chip active" id="tgl-exp" onclick="toggleChip('exp')">
          <span class="tgl-check"><span data-np-icon="badge-check" data-np-size="12"></span></span>
          <span class="tgl-icon"><span data-np-icon="wallet" data-np-size="18"></span></span>
          <span>Expenses</span>
        </div>
      </div>
      <div class="toggle-hint">You can change this later from event settings</div>
    </div>

    <div class="organizer-note">You will be the Organizer of this event</div>

    <div class="error-msg" id="main-error"><span></span></div>

    <button class="btn btn-solid-primary" id="create-btn" type="button">
      <span class="btn-text">Create Event</span>
      <span class="spinner"></span>
    </button>
    <button type="button" class="btn btn-text-secondary" onclick="window.location.href=getCleanUrl('dashboard.html')">Cancel</button>

    <div class="footer">Notepay v1.0 &middot; Made with <span data-np-icon="heart" data-np-size="14"></span> in India</div>
  </div>
</div>

<script src="js/firebase-config.js?v=25"></script>
<script src="js/icons.js?v=25"></script>
<script src="js/api.js?v=25"></script>
<script src="js/auth-guard.js?v=25"></script>
<script>
  const urlParams = new URLSearchParams(window.location.search);
  const editId = urlParams.get("edit");

  let showDon = true, showExp = true;

  function toggleChip(type) {
    const other = type === 'don' ? showExp : showDon;
    const current = type === 'don' ? showDon : showExp;
    // At least one must remain enabled
    if (current && !other) {
      showToast('At least one table must be enabled', 'error');
      return;
    }
    if (type === 'don') showDon = !showDon;
    else showExp = !showExp;
    document.getElementById('tgl-don').classList.toggle('active', showDon);
    document.getElementById('tgl-exp').classList.toggle('active', showExp);
  }

  if (editId) {
    document.querySelector(".ab-ttl").textContent = "Edit Event";
    document.querySelector(".btn-text").textContent = "Save Changes";
    document.querySelector(".organizer-note").style.display = "none";
    
    // Load existing event data
    waitForAuthReady().then(async user => {
      if (!user) return;
      try {
        const my = await getMyEvents();
        const ev = my.find(e => e.id == editId);
        if (ev) {
          document.getElementById("ev-name").value = ev.name;
          document.getElementById("ev-desc").value = ev.description;
          document.getElementById("ev-date").value = ev.event_date.split("T")[0];
          // Restore table visibility toggles
          showDon = ev.show_donations !== false;
          showExp = ev.show_expenses !== false;
          document.getElementById('tgl-don').classList.toggle('active', showDon);
          document.getElementById('tgl-exp').classList.toggle('active', showExp);
        }
      } catch(e) {
        console.error("Failed to load event details", e);
      }
    });
  } else {
    // Set default date to today
    document.getElementById("ev-date").valueAsDate = new Date();
  }

  document.getElementById("create-btn").addEventListener("click", async () => {
    const name  = document.getElementById("ev-name").value.trim();
    const desc  = document.getElementById("ev-desc").value.trim();
    const date  = document.getElementById("ev-date").value;
    const btn   = document.getElementById("create-btn");

    // Hide all previous errors
    document.getElementById("ev-name-error").style.display = "none";
    document.getElementById("ev-desc-error").style.display = "none";
    document.getElementById("ev-date-error").style.display = "none";

    if (!name) {
      const err = document.getElementById("ev-name-error");
      err.textContent = "Event name is required.";
      err.style.display = "block";
      document.getElementById("ev-name").focus();
      return;
    }
    if (!desc) {
      const err = document.getElementById("ev-desc-error");
      err.textContent = "Description is required.";
      err.style.display = "block";
      document.getElementById("ev-desc").focus();
      return;
    }
    if (!date) {
      const err = document.getElementById("ev-date-error");
      err.textContent = "Event date is required.";
      err.style.display = "block";
      document.getElementById("ev-date").focus();
      return;
    }

    btn.classList.add("loading"); btn.disabled = true;
    try {
      if (editId) {
        await updateEvent(editId, {
          name, description: desc, event_date: new Date(date).toISOString(),
          show_donations: showDon, show_expenses: showExp
        });
        showToast("Event updated!");
        window.history.back();
      } else {
        await createEvent(name, desc, date, showDon, showExp);
        showToast("Event created!");
        window.location.replace(getCleanUrl("dashboard.html"));
      }
    } catch(err) {
      showToast(err.message || "Failed to save event. Please try again.", "error");
      btn.classList.remove("loading"); btn.disabled = false;
    }
  });
</script>
